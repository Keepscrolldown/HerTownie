<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | HERTOWNIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input:focus { border-color: #000 !important; }
    </style>
</head>

<body class="bg-[#fafafa] flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white p-10 shadow-sm border border-gray-100">
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black tracking-tighter cursor-pointer"
                onclick="location.href='index.html'">
                HERTOWNIE
            </h1>
            <p class="text-[10px] uppercase tracking-widest text-gray-400 mt-4 font-bold">
                Create New Password
            </p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400 mb-2 block tracking-widest">
                    New Password
                </label>
                <input type="password" id="new-password" required
                    class="w-full p-4 border border-gray-100 bg-gray-50/50 outline-none text-sm transition-all focus:bg-white"
                    placeholder="••••••••">
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400 mb-2 block tracking-widest">
                    Confirm Password
                </label>
                <input type="password" id="confirm-password" required
                    class="w-full p-4 border border-gray-100 bg-gray-50/50 outline-none text-sm transition-all focus:bg-white"
                    placeholder="••••••••">
            </div>

            <button id="reset-btn" onclick="resetPassword()"
                class="w-full bg-black text-white py-5 text-[11px] font-black uppercase tracking-[0.3em] hover:bg-zinc-800 transition shadow-lg">
                Update Password
            </button>
        </div>
    </div>

    <script>
        async function resetPassword() {
            const password = document.getElementById("new-password").value;
            const confirm = document.getElementById("confirm-password").value;
            const btn = document.getElementById("reset-btn");

            // 1. Get token from URL (e.g., reset-password.html?token=xyz123)
            const token = new URLSearchParams(window.location.search).get("token");

            if (!token) {
                alert("Invalid or expired session. Please request a new reset link.");
                return;
            }

            if (password !== confirm) {
                alert("Passwords do not match");
                return;
            }

            if (password.length < 8) {
                alert("Security requirement: Password must be at least 8 characters");
                return;
            }
            const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

            if (!strongPassword.test(password)) {
                alert("Password must include:\n- At least one uppercase letter\n- One lowercase letter\n- One number\n- One special character (@$!%*?&)");
                return;
            }

            // UI Loading State
            const originalText = btn.innerText;
            btn.innerText = "UPDATING...";
            btn.disabled = true;

            try {
                // IMPORTANT: Changed endpoint to your actual API route
                const res = await fetch("http://localhost:5000/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Success! Your password has been updated.");
                    // Redirect to your login page
                    window.location.href = "login.html"; 
                } else {
                    alert(data.message || "Reset failed. The link may have expired.");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }

            } catch (err) {
                console.error(err);
                alert("Server error. Please check if your backend is running.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
