<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clothify Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-black">

    <!-- Login Card -->
    <div class="w-full max-w-md p-8 bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-white tracking-wide">
                HERTOWNIE
            </h1>
            <p class="text-gray-300 text-sm mt-1">
                Admin Portal
            </p>
        </div>

        <!-- Form -->
        <form id="login-form" class="space-y-5">

            <!-- Email -->
            <div>
                <label class="block text-gray-300 text-sm mb-2">
                    Email
                </label>
                <input type="text" id="username" placeholder="Enter admin email" required
                    class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-300 text-sm mb-2">
                    Password
                </label>
                <input type="password" id="password" placeholder="Enter password" required
                    class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition">
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full py-3 rounded-lg bg-white text-black font-semibold hover:bg-gray-200 transition duration-300">
                <span id="button-text">Login</span>
            </button>

            <!-- Error -->
            <p id="error-message" class="text-red-400 text-sm text-center hidden"></p>

        </form>

        <!-- Footer -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-gray-400 text-sm hover:text-white transition">
                ← Back to Store
            </a>
        </div>

    </div>

    <script src="admin-login.js"></script>

</body>

</html>
